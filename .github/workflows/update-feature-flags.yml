name: Update Codex Feature Flags

on:
  schedule:
    - cron: "15 8 * * *"
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/snapshot_feature_flags.py"
      - "docs/developers.openai.com/codex/config-basic/index.md"
      - "docs/developers.openai.com/codex/config-reference/index.md"
      - "docs/feature-flags/**"

permissions:
  contents: read

jobs:
  validate-feature-flags:
    if: github.event_name == 'pull_request'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Generate feature lifecycle snapshot
        run: python3 scripts/snapshot_feature_flags.py

      - name: Upload snapshot artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feature-flags-snapshot-${{ matrix.os }}
          path: docs/feature-flags/
          if-no-files-found: error

      - name: Check for snapshot changes
        id: changed
        run: |
          if git diff --quiet -- docs/feature-flags/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Enforce snapshot freshness
        if: steps.changed.outputs.changed == 'true'
        run: |
          echo "Feature-flag snapshot drift detected. Run:"
          echo "  python3 scripts/snapshot_feature_flags.py"
          echo "and commit docs/feature-flags/*."
          git --no-pager diff -- docs/feature-flags/
          exit 1

  update-feature-flags:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Generate feature lifecycle snapshot
        run: python3 scripts/snapshot_feature_flags.py

      - name: Upload snapshot artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feature-flags-snapshot-ubuntu-latest
          path: docs/feature-flags/
          if-no-files-found: error

      - name: Check for snapshot changes
        id: changed
        run: |
          if git diff --quiet -- docs/feature-flags/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push snapshot updates
        if: steps.changed.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/feature-flags/
          git commit -m "chore: refresh feature-flag lifecycle snapshot ($(date -u +'%Y-%m-%d'))"
          git push
