name: Update Codex Documentation

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  update-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Sync docs
        id: sync
        continue-on-error: true
        run: |
          set -o pipefail
          python scripts/fetch_codex_docs.py 2>&1 | tee sync.log

      - name: Upload sync log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-log
          path: sync.log
          if-no-files-found: warn

      - name: Upload source coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-coverage
          path: docs/source_coverage.json
          if-no-files-found: warn

      - name: Check for changes
        if: steps.sync.outcome == 'success'
        id: changed
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push if changed
        if: steps.sync.outcome == 'success' && steps.changed.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/ weekly/
          git commit -m "chore: sync codex docs ($(date -u +'%Y-%m-%d'))"
          git push

      - name: Build failure context
        if: steps.sync.outcome == 'failure'
        id: failure-context
        run: |
          {
            echo 'sync_log_tail<<EOF'
            tail -n 120 sync.log || true
            echo EOF
            echo 'sync_summary<<EOF'
            cat docs/sync_summary.json || true
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create or update failure issue
        if: steps.sync.outcome == 'failure'
        uses: actions/github-script@v7
        env:
          SYNC_LOG_TAIL: ${{ steps.failure-context.outputs.sync_log_tail }}
          SYNC_SUMMARY: ${{ steps.failure-context.outputs.sync_summary }}
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            const title = `Codex docs sync failed - ${date}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const syncLogTail = (process.env.SYNC_LOG_TAIL || '').slice(-12000) || '(no log available)';
            const syncSummary = (process.env.SYNC_SUMMARY || '').slice(-12000) || '(no sync summary available)';

            const body = [
              `Automated docs sync failed on ${date}.`,
              '',
              `Workflow run: ${runUrl}`,
              '',
              '### Sync summary',
              '```json',
              syncSummary,
              '```',
              '',
              '### Sync log tail',
              '```text',
              syncLogTail,
              '```',
            ].join('\n');

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            const existing = openIssues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['bug', 'automation'],
              });
            }

      - name: Fail workflow when sync fails
        if: steps.sync.outcome == 'failure'
        run: exit 1
